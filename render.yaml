services:
  - type: web
    name: breathe-esg
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn breathe_api.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: breathe-db
    plan: free
